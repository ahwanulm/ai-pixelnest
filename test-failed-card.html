<!DOCTYPE html>
<html>
<head>
    <title>Test Failed Card Real-Time</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold text-white mb-4">Test Failed Card Display</h1>
        
        <button onclick="testFailedCard()" class="px-4 py-2 bg-red-600 text-white rounded mb-4">
            Trigger Failed Card
        </button>
        
        <button onclick="testSuccessCard()" class="px-4 py-2 bg-green-600 text-white rounded mb-4 ml-2">
            Trigger Success Card
        </button>
        
        <button onclick="clearCards()" class="px-4 py-2 bg-gray-600 text-white rounded mb-4 ml-2">
            Clear All
        </button>
        
        <div id="result-display" class="space-y-4">
            <!-- Cards will appear here -->
        </div>
    </div>
    
    <script>
        function testFailedCard() {
            const resultDisplay = document.getElementById('result-display');
            
            // Create failed card
            const card = document.createElement('div');
            card.className = 'bg-zinc-800 border border-red-500 rounded-xl p-4 transition-all duration-300';
            card.style.opacity = '0';
            card.style.transform = 'translateY(-20px)';
            
            card.innerHTML = `
                <div class="text-red-400 font-bold mb-2">❌ Generation Failed</div>
                <div class="text-gray-300 text-sm">Error: This is a test error message</div>
                <div class="text-gray-500 text-xs mt-2">Created: ${new Date().toLocaleTimeString()}</div>
            `;
            
            // Insert
            resultDisplay.insertBefore(card, resultDisplay.firstChild);
            console.log('Failed card inserted');
            
            // Animate
            setTimeout(() => {
                card.style.transition = 'all 0.4s ease-out';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
                console.log('Failed card animated');
            }, 10);
        }
        
        function testSuccessCard() {
            const resultDisplay = document.getElementById('result-display');
            
            // Create success card
            const card = document.createElement('div');
            card.className = 'bg-zinc-800 border border-green-500 rounded-xl p-4 transition-all duration-300';
            card.style.opacity = '0';
            card.style.transform = 'translateY(-20px)';
            
            card.innerHTML = `
                <div class="text-green-400 font-bold mb-2">✅ Generation Success</div>
                <div class="text-gray-300 text-sm">Result: Test image generated successfully</div>
                <div class="text-gray-500 text-xs mt-2">Created: ${new Date().toLocaleTimeString()}</div>
            `;
            
            // Insert
            resultDisplay.insertBefore(card, resultDisplay.firstChild);
            console.log('Success card inserted');
            
            // Animate
            setTimeout(() => {
                card.style.transition = 'all 0.4s ease-out';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
                console.log('Success card animated');
            }, 10);
        }
        
        function clearCards() {
            document.getElementById('result-display').innerHTML = '';
            console.log('All cards cleared');
        }
    </script>
</body>
</html>

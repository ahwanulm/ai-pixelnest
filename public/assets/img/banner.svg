<svg width="800" height="200" viewBox="0 0 800 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="200" fill="white"/>
  <rect width="800" height="200" stroke="#e2e8f0" stroke-width="2"/>
  
  <!-- Logo Icon -->
  <g transform="translate(60, 50)">
    <!-- Pixel Grid Pattern (Nest concept) -->
    <rect x="40" y="0" width="20" height="20" fill="#334155" rx="2"/>
    
    <rect x="20" y="20" width="20" height="20" fill="#475569" rx="2"/>
    <rect x="40" y="20" width="20" height="20" fill="#1e293b" rx="2"/>
    <rect x="60" y="20" width="20" height="20" fill="#475569" rx="2"/>
    
    <rect x="0" y="40" width="20" height="20" fill="#64748b" rx="2"/>
    <rect x="20" y="40" width="20" height="20" fill="#334155" rx="2"/>
    <rect x="40" y="40" width="20" height="20" fill="#0f172a" rx="2"/>
    <rect x="60" y="40" width="20" height="20" fill="#334155" rx="2"/>
    <rect x="80" y="40" width="20" height="20" fill="#64748b" rx="2"/>
    
    <rect x="0" y="60" width="20" height="20" fill="#475569" rx="2"/>
    <rect x="20" y="60" width="20" height="20" fill="#1e293b" rx="2"/>
    <rect x="40" y="60" width="20" height="20" fill="#0f172a" rx="2"/>
    <rect x="60" y="60" width="20" height="20" fill="#1e293b" rx="2"/>
    <rect x="80" y="60" width="20" height="20" fill="#475569" rx="2"/>
    
    <rect x="20" y="80" width="20" height="20" fill="#64748b" rx="2"/>
    <rect x="40" y="80" width="20" height="20" fill="#334155" rx="2"/>
    <rect x="60" y="80" width="20" height="20" fill="#64748b" rx="2"/>
  </g>
  
  <!-- Text -->
  <text x="230" y="110" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="800" fill="#0f172a">
    PixelNest
  </text>
  
  <text x="230" y="145" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="400" fill="#64748b">
    AI-Powered Video Intelligence
  </text>
  
  <!-- Decorative Elements -->
  <circle cx="720" cy="100" r="4" fill="#1e293b" opacity="0.3"/>
  <circle cx="740" cy="80" r="3" fill="#334155" opacity="0.4"/>
  <circle cx="760" cy="120" r="3" fill="#475569" opacity="0.4"/>
  <circle cx="780" cy="100" r="2" fill="#64748b" opacity="0.5"/>
</svg>


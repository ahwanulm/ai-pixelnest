<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle with Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.3" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="48" height="48" rx="12" fill="url(#bgGradient)"/>
  <rect width="48" height="48" rx="12" fill="#18181b" fill-opacity="0.6"/>
  
  <!-- Image Frame -->
  <rect x="10" y="10" width="28" height="28" rx="4" stroke="url(#iconGradient)" stroke-width="2" fill="none"/>
  
  <!-- Mountain/Landscape -->
  <path d="M12 32 L20 20 L26 28 L32 22 L36 28 L36 36 L12 36 Z" fill="url(#iconGradient)" opacity="0.6"/>
  
  <!-- Sun/Circle -->
  <circle cx="30" cy="18" r="3" fill="#a78bfa"/>
  
  <!-- Sparkle Effect -->
  <path d="M38 12 L39 14 L41 15 L39 16 L38 18 L37 16 L35 15 L37 14 Z" fill="#c4b5fd" opacity="0.8"/>
  <path d="M14 8 L14.5 9 L15.5 9.5 L14.5 10 L14 11 L13.5 10 L12.5 9.5 L13.5 9 Z" fill="#c4b5fd" opacity="0.6"/>
</svg>

